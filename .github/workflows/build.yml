name: build-and-release

on:
  push:
    branches:
      - "**"
    tags:
      - "v*"
  pull_request:
    branches:
      - "**"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version, for example 0.1.0-beta"
        required: false
        type: string

permissions:
  contents: write

concurrency:
  group: build-release-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  ci-compile:
    if: github.event_name == 'push' || github.event_name == 'pull_request'
    strategy:
      fail-fast: false
      matrix:
        platform:
          - ubuntu-latest
    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install Rust Stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust Artifacts
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install Frontend Dependencies
        run: npm install

      - name: Lint Frontend
        run: npm run lint

      - name: Build Frontend
        run: npm run build

  prepare-release:
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
      tag: ${{ steps.meta.outputs.tag }}
      release_name: ${{ steps.meta.outputs.release_name }}
      prerelease: ${{ steps.meta.outputs.prerelease }}
      channel: ${{ steps.meta.outputs.channel }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve Release Metadata
        id: meta
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          elif [[ -n "${{ github.event.inputs.version }}" ]]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="$(node -p "require('./package.json').version")"
          fi

          if [[ "$VERSION" == *"beta"* || "$VERSION" == *"alpha"* || "$VERSION" == *"rc"* ]]; then
            PRERELEASE=true
            CHANNEL=beta
          else
            PRERELEASE=false
            CHANNEL=stable
          fi

          TAG="v${VERSION}"

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "release_name=BilBiliChat v$VERSION" >> "$GITHUB_OUTPUT"
          echo "prerelease=$PRERELEASE" >> "$GITHUB_OUTPUT"
          echo "channel=$CHANNEL" >> "$GITHUB_OUTPUT"

      - name: Create Tag For Manual Release
        if: github.event_name == 'workflow_dispatch'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ steps.meta.outputs.tag }}
        run: |
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            echo "Release already exists for $RELEASE_TAG"
            exit 0
          fi

          if git rev-parse "$RELEASE_TAG" >/dev/null 2>&1; then
            echo "Tag $RELEASE_TAG already exists locally"
            exit 0
          fi

          git tag "$RELEASE_TAG"
          git push origin "$RELEASE_TAG"

  build-tauri:
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    needs: prepare-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            args: ""
            raw_binary_path: src-tauri/target/release/bilbilichat.exe
            raw_binary_name: bilbilichat.exe
            raw_asset_suffix: windows-x64
            raw_archive_ext: zip
          - platform: macos-latest
            args: ""
            raw_binary_path: src-tauri/target/release/bilbilichat
            raw_binary_name: bilbilichat
            raw_asset_suffix: macos-x64
            raw_archive_ext: tar.gz
          - platform: ubuntu-latest
            args: ""
            raw_binary_path: src-tauri/target/release/bilbilichat
            raw_binary_name: bilbilichat
            raw_asset_suffix: linux-x64
            raw_archive_ext: tar.gz
    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare-release.outputs.tag }}

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install Rust Stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux System Dependencies
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            file \
            libayatana-appindicator3-dev \
            libgtk-3-dev \
            libjavascriptcoregtk-4.1-dev \
            librsvg2-dev \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            libxdo-dev \
            patchelf

      - name: Cache Rust Artifacts
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install Frontend Dependencies
        run: npm install

      - name: Prepare Updater Signing Key
        id: signing_key
        shell: bash
        env:
          RAW_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          BASE64_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_BASE64 }}
        run: |
          KEY_PATH="$RUNNER_TEMP/tauri-updater.key"

          if [[ -n "$BASE64_KEY" ]]; then
            printf '%s' "$BASE64_KEY" | base64 --decode > "$KEY_PATH"
          elif [[ -n "$RAW_KEY" ]]; then
            cat > "$KEY_PATH" <<'EOF'
          ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          EOF
          else
            echo "Missing signing key secret. Provide TAURI_SIGNING_PRIVATE_KEY or TAURI_SIGNING_PRIVATE_KEY_BASE64."
            exit 1
          fi

          chmod 600 "$KEY_PATH"

          if ! grep -q "minisign" "$KEY_PATH"; then
            echo "Invalid updater private key format."
            echo "Expected a minisign secret key file with comment header."
            exit 1
          fi

          echo "path=$KEY_PATH" >> "$GITHUB_OUTPUT"

      - name: Build And Release Tauri App
        uses: tauri-apps/tauri-action@v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ steps.signing_key.outputs.path }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: .
          tagName: ${{ needs.prepare-release.outputs.tag }}
          releaseName: ${{ needs.prepare-release.outputs.release_name }}
          releaseBody: |
            BilBiliChat Beta release for desktop testers.

            - See `CHANGELOG.md` for curated release history.
            - See auto generated notes below for merged changes.
          releaseDraft: false
          prerelease: ${{ needs.prepare-release.outputs.prerelease }}
          generateReleaseNotes: true
          args: ${{ matrix.args }}

      - name: Set Raw Binary Asset Name
        shell: bash
        env:
          RELEASE_VERSION: ${{ needs.prepare-release.outputs.version }}
          RAW_ASSET_SUFFIX: ${{ matrix.raw_asset_suffix }}
          RAW_ARCHIVE_EXT: ${{ matrix.raw_archive_ext }}
        run: |
          echo "RAW_ARCHIVE_NAME=BilBiliChat_${RELEASE_VERSION}_${RAW_ASSET_SUFFIX}_binary.${RAW_ARCHIVE_EXT}" >> "$GITHUB_ENV"

      - name: Archive Raw Binary
        shell: bash
        env:
          RAW_BINARY_PATH: ${{ matrix.raw_binary_path }}
          RAW_BINARY_NAME: ${{ matrix.raw_binary_name }}
          RAW_ARCHIVE_NAME: ${{ env.RAW_ARCHIVE_NAME }}
        run: |
          python3 - <<'PY'
          import os
          import pathlib
          import tarfile
          import zipfile

          raw_binary_path = pathlib.Path(os.environ["RAW_BINARY_PATH"])
          raw_binary_name = os.environ["RAW_BINARY_NAME"]
          raw_archive_name = pathlib.Path(os.environ["RAW_ARCHIVE_NAME"])

          if not raw_binary_path.exists():
            raise SystemExit(f"Raw binary not found: {raw_binary_path}")

          if raw_archive_name.suffix == ".zip":
            with zipfile.ZipFile(raw_archive_name, "w", compression=zipfile.ZIP_DEFLATED) as archive:
              archive.write(raw_binary_path, arcname=raw_binary_name)
          else:
            with tarfile.open(raw_archive_name, "w:gz") as archive:
              archive.add(raw_binary_path, arcname=raw_binary_name)
          PY

      - name: Upload Raw Binary Asset
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ needs.prepare-release.outputs.tag }}
          RAW_ARCHIVE_NAME: ${{ env.RAW_ARCHIVE_NAME }}
        run: |
          gh release upload "$RELEASE_TAG" "$RAW_ARCHIVE_NAME" --clobber

  publish-release-assets:
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    needs:
      - prepare-release
      - build-tauri
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Fetch Release Metadata
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ needs.prepare-release.outputs.tag }}
        run: |
          gh api "repos/${GITHUB_REPOSITORY}/releases/tags/${RELEASE_TAG}" > release.json

      - name: Download Release Assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ needs.prepare-release.outputs.tag }}
        run: |
          mkdir -p .release-assets
          gh release download "$RELEASE_TAG" \
            --pattern "*.sig" \
            --pattern "*.app.tar.gz" \
            --pattern "*-setup.exe" \
            --pattern "*.msi" \
            --pattern "*.AppImage" \
            --pattern "*.deb" \
            --pattern "*_binary.zip" \
            --pattern "*_binary.tar.gz" \
            --dir .release-assets

      - name: Build Asset Metadata
        shell: bash
        run: |
          node --input-type=module <<'NODE'
          import { existsSync, readFileSync, writeFileSync } from 'node:fs'
          const release = JSON.parse(readFileSync('release.json', 'utf8'))
          const assets = release.assets.map((asset) => ({
            name: asset.name,
            browser_download_url: asset.browser_download_url,
            local_path: existsSync(`.release-assets/${asset.name}`) ? `.release-assets/${asset.name}` : null,
          }))
          writeFileSync('release-assets.json', JSON.stringify(assets, null, 2))
          NODE

      - name: Generate latest.json And Checksums
        env:
          RELEASE_JSON_PATH: release.json
          RELEASE_ASSETS_JSON_PATH: release-assets.json
          RELEASE_VERSION: ${{ needs.prepare-release.outputs.version }}
          RELEASE_CHANNEL: ${{ needs.prepare-release.outputs.channel }}
          RELEASE_OUTPUT_DIR: dist/release-assets
        run: node scripts/generate-release-assets.mjs

      - name: Upload latest.json And Checksums
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ needs.prepare-release.outputs.tag }}
          RELEASE_CHANNEL: ${{ needs.prepare-release.outputs.channel }}
        run: |
          gh release upload "$RELEASE_TAG" \
            dist/release-assets/latest.json \
            dist/release-assets/${RELEASE_CHANNEL}.latest.json \
            dist/release-assets/checksums.json \
            --clobber
